name: docs-ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build site and search records
        env:
          GITHUB_PAGES: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
        run: npm run build

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: qingflow-help-center-build
          path: |
            build
            .tmp/search-records.json

  deploy-pages:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate-and-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-typesense:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate-and-build
    env:
      TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
      TYPESENSE_ADMIN_API_KEY: ${{ secrets.TYPESENSE_ADMIN_API_KEY }}
      TYPESENSE_COLLECTION: ${{ secrets.TYPESENSE_COLLECTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate search records
        run: npm run build:index

      - name: Push records to Typesense
        if: ${{ env.TYPESENSE_HOST != '' && env.TYPESENSE_ADMIN_API_KEY != '' }}
        run: npm run search:push
