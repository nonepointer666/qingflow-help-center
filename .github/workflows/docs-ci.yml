name: docs-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build site and search records
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: qingflow-help-center-build
          path: |
            build
            .tmp/search-records.json

  sync-typesense:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: validate-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate search records
        run: npm run build:index

      - name: Push records to Typesense
        if: ${{ secrets.TYPESENSE_HOST != '' && secrets.TYPESENSE_ADMIN_API_KEY != '' }}
        env:
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_ADMIN_API_KEY: ${{ secrets.TYPESENSE_ADMIN_API_KEY }}
          TYPESENSE_COLLECTION: ${{ secrets.TYPESENSE_COLLECTION }}
        run: npm run search:push
